<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>梦想小屋 - 3D花园世界</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0a1628}
        #gameCanvas{display:block;width:100%;height:100%}
        #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

        #topBar{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:auto}
        .money-box{background:linear-gradient(135deg,#ffd700,#ffaa00);padding:8px 18px;border-radius:22px;font-size:17px;font-weight:bold;color:#5d4037;box-shadow:0 4px 12px rgba(255,170,0,0.4),inset 0 2px 4px rgba(255,255,255,0.4)}
        .top-btns{display:flex;gap:8px;align-items:center}
        .btn{padding:8px 16px;border-radius:18px;font-size:13px;color:#fff;border:none;box-shadow:0 3px 10px rgba(0,0,0,0.3);cursor:pointer;transition:transform .15s,box-shadow .15s;pointer-events:auto}
        .btn:hover{transform:scale(1.06);box-shadow:0 5px 14px rgba(0,0,0,0.4)}
        .btn-house{background:linear-gradient(135deg,#8d6e63,#5d4037)}
        .btn-time{background:linear-gradient(135deg,#ffd700,#ffab00);color:#5d4037}
        .house-label{font-size:11px;color:rgba(255,255,255,0.8);text-align:center;margin-top:4px}

        #shopBtn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff9800,#f57c00);padding:14px 36px;border-radius:28px;font-size:17px;color:#fff;border:none;box-shadow:0 4px 14px rgba(255,152,0,0.45);pointer-events:auto;cursor:pointer;transition:all .2s;z-index:10;touch-action:manipulation}
        #shopBtn:hover{transform:translateX(-50%) scale(1.06)}
        #shopBtn:active{transform:translateX(-50%) scale(0.97)}

        #shop{display:none;position:absolute;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.97);border-radius:16px;padding:10px;max-width:95%;width:420px;max-height:240px;overflow-y:auto;pointer-events:auto;box-shadow:0 -4px 24px rgba(0,0,0,0.25)}
        #shop::-webkit-scrollbar{width:5px}
        #shop::-webkit-scrollbar-thumb{background:#ff9800;border-radius:3px}
        .shop-item{display:inline-block;background:linear-gradient(180deg,#fff,#f5f5f5);border:2px solid #ddd;border-radius:10px;padding:10px;margin:4px;text-align:center;width:72px;cursor:pointer;transition:all .2s;vertical-align:top;touch-action:manipulation}
        .shop-item:active{transform:scale(0.95)}
        .shop-item:hover{transform:scale(1.06);border-color:#ff9800}
        .shop-item.selected{border-color:#f57f17;background:linear-gradient(180deg,#fff9c4,#ffecb3);box-shadow:0 0 8px rgba(255,152,0,0.4)}
        .shop-item .icon{font-size:28px;height:30px;display:flex;align-items:center;justify-content:center}
        .shop-item .name{font-size:12px;color:#333;margin-top:2px}
        .shop-item .price{font-size:13px;color:#ff9800;font-weight:bold;margin-top:3px}

        #toast{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.78);color:#fff;padding:12px 26px;border-radius:10px;font-size:16px;pointer-events:none;z-index:100;transition:opacity .3s;white-space:nowrap}

        .hint{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.55);font-size:11px;pointer-events:none;text-align:center;white-space:nowrap}
    </style>
</head>
<body>
    <div id="gameCanvas"></div>
    <div id="ui">
        <div id="topBar">
            <div class="money-box">💰 <span id="moneyDisplay">9999</span></div>
            <div>
                <div class="top-btns">
                    <button class="btn btn-house" onclick="upgradeHouse()">🏠 升级</button>
                    <button class="btn btn-time" onclick="cycleTime()">⏰ 时间</button>
                </div>
                <div class="house-label" id="houseInfo"></div>
            </div>
        </div>
        <button id="shopBtn" onclick="toggleShop()">🛒 商店</button>
        <div id="shop"></div>
        <div class="hint">👆 单指旋转 · 双指缩放 · 点击放置</div>
        <div id="toast"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="game_three.js?v=3"></script>
</body>
</html>
