<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>梦想小屋 - 花园装修</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// 微信小游戏 API 适配层（浏览器 → wx shim）
const el = document.getElementById('gameCanvas');
const ctx2d = el.getContext('2d');

// 模拟 wx 对象
const wx = {
    createCanvas() {
        return el;
    },
    getSystemInfoSync() {
        return {
            windowWidth: window.innerWidth,
            windowHeight: window.innerHeight,
            pixelRatio: window.devicePixelRatio || 1
        };
    },
    onTouchStart(callback) {
        el.addEventListener('touchstart', (e) => { e.preventDefault(); callback(e); });
        el.addEventListener('mousedown', (e) => {
            callback({ touches: [{ clientX: e.clientX, clientY: e.clientY }] });
        });
    },
    onTouchMove(callback) {
        el.addEventListener('touchmove', (e) => { e.preventDefault(); callback(e); });
        el.addEventListener('mousemove', (e) => {
            if (e.buttons) callback({ touches: [{ clientX: e.clientX, clientY: e.clientY }] });
        });
    },
    onTouchEnd(callback) {
        el.addEventListener('touchend', (e) => { e.preventDefault(); callback(e); });
        el.addEventListener('mouseup', () => callback());
    }
};

// 适配 Canvas 尺寸（高分屏）
(function initCanvas() {
    const dpr = window.devicePixelRatio || 1;
    el.width = window.innerWidth * dpr;
    el.height = window.innerHeight * dpr;
    el.style.width = window.innerWidth + 'px';
    el.style.height = window.innerHeight + 'px';
    ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
})();
window.addEventListener('resize', () => {
    const dpr = window.devicePixelRatio || 1;
    el.width = window.innerWidth * dpr;
    el.height = window.innerHeight * dpr;
    el.style.width = window.innerWidth + 'px';
    el.style.height = window.innerHeight + 'px';
    ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
});
</script>
<script src="game.js"></script>
</body>
</html>
