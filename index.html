<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>梦想小屋 - 花园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1628; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const el = document.getElementById('gameCanvas');
const wx = {
    createCanvas() { return el; },
    getSystemInfoSync() {
        return { windowWidth: window.innerWidth, windowHeight: window.innerHeight, pixelRatio: window.devicePixelRatio || 1 };
    },
    onTouchStart(cb) {
        el.addEventListener('touchstart', e => { e.preventDefault(); cb(e); }, { passive: false });
        el.addEventListener('mousedown', e => cb({ touches: [{ clientX: e.clientX, clientY: e.clientY }] }));
    },
    onTouchMove(cb) {
        el.addEventListener('touchmove', e => { e.preventDefault(); cb(e); }, { passive: false });
        el.addEventListener('mousemove', e => { if (e.buttons) cb({ touches: [{ clientX: e.clientX, clientY: e.clientY }] }); });
    },
    onTouchEnd(cb) {
        el.addEventListener('touchend', e => { e.preventDefault(); cb(e); }, { passive: false });
        el.addEventListener('mouseup', cb);
    }
};
(function initCanvas() {
    const dpr = window.devicePixelRatio || 1;
    el.width = window.innerWidth * dpr; el.height = window.innerHeight * dpr;
    el.style.width = window.innerWidth + 'px'; el.style.height = window.innerHeight + 'px';
})();
window.addEventListener('resize', () => {
    const dpr = window.devicePixelRatio || 1;
    el.width = window.innerWidth * dpr; el.height = window.innerHeight * dpr;
    el.style.width = window.innerWidth + 'px'; el.style.height = window.innerHeight + 'px';
    if (canvas) { canvas.width = el.width; canvas.height = el.height; }
});
</script>
<script src="game.js"></script>
</body>
</html>
